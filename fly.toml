app = "marketlink-api"
primary_region = "ams"

[build]
  dockerfile = "src/MarketLink.API/Dockerfile"
  build-target = "final"

[build.args]
  BUILD_CONTEXT = "src"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  Jwt__Issuer    = "MarketLink"
  Jwt__Audience  = "MarketLink"
  Minio__UseSSL         = "false"
  Minio__PublicBucket   = "marketlink-public"
  Minio__PrivateBucket  = "marketlink-private"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 512
