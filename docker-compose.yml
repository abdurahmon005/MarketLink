version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: marketlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-MarketLinkDb}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yourpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - marketlink-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-MarketLinkDb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ───────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: marketlink-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - marketlink-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── MinIO Bucket Setup (bir martalik) ───────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: marketlink-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_USER:-minioadmin} ${MINIO_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing local/marketlink-public &&
        mc mb --ignore-existing local/marketlink-private &&
        mc anonymous set public local/marketlink-public &&
        echo 'MinIO bucketlar tayyor';
      "
    networks:
      - marketlink-net

  # ── API ─────────────────────────────────────────────────────
  api:
    build:
      context: ./src
      dockerfile: MarketLink.API/Dockerfile
    container_name: marketlink-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-MarketLinkDb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-yourpassword}"
      Jwt__SecretKey:   ${JWT_SECRET:-MarketLink_SuperSecretKey_Min32Chars_ChangeThis!}
      Jwt__Issuer:      ${JWT_ISSUER:-MarketLink}
      Jwt__Audience:    ${JWT_AUDIENCE:-MarketLink}
      Eskiz__Email:     ${ESKIZ_EMAIL:-}
      Eskiz__Password:  ${ESKIZ_PASSWORD:-}
      Minio__Endpoint:  "minio:9000"
      Minio__AccessKey: ${MINIO_USER:-minioadmin}
      Minio__SecretKey: ${MINIO_PASSWORD:-minioadmin}
      Minio__UseSSL:    "false"
      Minio__PublicBucket:  "marketlink-public"
      Minio__PrivateBucket: "marketlink-private"
      Minio__PublicBaseUrl: ${MINIO_PUBLIC_URL:-http://localhost:9000}
    ports:
      - "${API_PORT:-5000}:8080"
    networks:
      - marketlink-net

volumes:
  postgres_data:
  minio_data:

networks:
  marketlink-net:
    driver: bridge
